interface:
  display_name: "sing-box REALITY HY2"
  short_description: "部署、修复并验证 REALITY+HY2 服务器及 Linux、macOS、Android、Windows 客户端"
  default_prompt: >-
    使用 $sing-box-reality-hy2 处理 VLESS REALITY + HY2 窄栈；先识别服务器、Linux TUN、
    macOS Surge 专属配置或协议、Android/SFA、Windows 或测试请求面，iOS/SFI 不在覆盖内；只读对应 reference
    并应用该请求面的验收标准，完整 rollout 才执行全部顺序，缺输入只问阻塞项。
